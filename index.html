<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF6B00" />
    <meta name="description" content="Super Collection - Your premium destination for mobile accessories and custom gifts." />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Super Collection</title>
    <script>
      // Handle chunk load errors (common after new deployments)
      window.addEventListener('error', (e) => {
        if (e.message && (e.message.includes('chunk') || e.message.includes('Loading chunk'))) {
          const lastReload = localStorage.getItem('last-chunk-reload');
          const now = Date.now();
          // Reload only once every 10 seconds to avoid infinite loops
          if (!lastReload || (now - parseInt(lastReload)) > 10000) {
            localStorage.setItem('last-chunk-reload', now.toString());
            window.location.reload(true);
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
